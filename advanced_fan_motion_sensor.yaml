blueprint:
  name: Advanced Fan Motion Sensor
  description:
    "This motion sensor is based on several ideas from other blueprints, and adding my own customizations.\n\n
    \n\n
    Inputs and actions are:\n
    - Turn on Fans/Air purifier when motion is no longer detected. The trigger can be a motion detector or anything that switches between ON and OFF. You can use several motion detectors.\n
    - The activation can be triggered between a certain time slot (so the bathroom light does not turn on in the middle of the night)\n
    - You can specify a luminance value: only run when it is darker than indicated\n
    - Sun horizon setting: you can run the action always, or only when the sun is above or below the horizon.\n
    - You can adjust the horizon by giving an elevation adjustment number\n
    - Wait time for turning off\n
    - Only run if an optional entity is in desired state (optional)\n
    - Default scene when motion stops (optional)\n
    - Only run the motion off action if an optional entity is in desired state\n"
domain: automation
  source_url: https://github.com/Delfairen/HomeAssistant_Blueprints/edit/main/advanced_custom_motion_sensor.yaml

  input:
    motion_entity:
      name: Motion Sensor
      description: Motion Sensor or group with Motion Sensors.
      selector:
        entity:
          multiple: false

    fan_target:
      name: Fan
      selector:
        target:
          entity:
            domain: fan

    luminance_sensor:
      name: Illuminance sensor
      description: Optional sensor used to determine illumination.
      default:
      selector:
        entity:
          domain: sensor
          device_class: illuminance
          multiple: false

    luminance_required:
      name: Required Lux Level
      description: Lux level below which the automation will run.
      default: 100
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lx

    no_motion_wait:
      name: Wait time
      description: Time to wait after motion stops before turning fan on.
      default: 120
      selector:
        number:
          min: 0
          max: 600
          unit_of_measurement: seconds
          mode: slider
          step: 1

    time_default_start:
      name: Only run fan-on action after this time
      default: "00:00:00"
      selector:
        time: {}

    time_default_end:
      name: Only run fan-on action before this time
      default: "00:00:00"
      selector:
        time: {}

    elevation:
      name: Elevation
      description: Choose whether to check if the sun is above, below the horizon, or always trigger the action.
      default: Always
      selector:
        select:
          options:
            - Always
            - Below horizon
            - Above horizon

    elevation_adjustment:
      name: Sun elevation adjustment
      default: 0
      selector:
        number:
          min: -90
          max: 90
          unit_of_measurement: degrees
          mode: slider
          step: 1

    automation_blocker:
      name: Automation Blocker
      description: Optional entity. Only run if this entity is in the desired state.
      default:
      selector:
        entity: {}

    automation_blocker_boolean:
      name: Automation Blocker Chooser
      description: Desired state of automation blocker.
      default: false
      selector:
        boolean: {}

    motion_off_blocker:
      name: No-Motion Action Blocker
      description: Optional entity. No-motion sequence is not run unless this entity is in the desired state.
      default:
      selector:
        entity: {}

    motion_off_blocker_boolean:
      name: No-Motion Blocker Chooser
      description: Desired state of no-motion blocker.
      default: false
      selector:
        boolean: {}

    scene_ambient:
      name: Ambient Scene
      description: Optional scene activated when no motion is detected.
      default: ""
      selector:
        entity:
          domain:
            - scene
          multiple: false

    time_scene_ambient_start:
      name: Ambient time frame start
      default: "00:00:00"
      selector:
        time: {}

    time_scene_ambient_end:
      name: Ambient time frame end
      default: "00:00:00"
      selector:
        time: {}

mode: restart
max_exceeded: silent

variables:
  scene_ambient: !input scene_ambient
  automation_blocker: !input automation_blocker
  automation_blocker_boolean: !input automation_blocker_boolean
  motion_off_blocker: !input motion_off_blocker
  motion_off_blocker_boolean: !input motion_off_blocker_boolean
  elevation: !input elevation
  elevation_adjustment: !input elevation_adjustment
  luminance_sensor: !input luminance_sensor

trigger:
  - platform: state
    entity_id: !input motion_entity
    from: "off"
    to: "on"

  - platform: state
    entity_id: !input motion_entity
    from: "on"
    to: "off"
    for:
      seconds: !input no_motion_wait

condition:
  - condition: or
    conditions:
      - condition: template
        value_template: "{{ automation_blocker == none }}"
      - condition: template
        value_template: "{{ automation_blocker_boolean and states[automation_blocker].state == 'on' }}"
      - condition: template
        value_template: "{{ not automation_blocker_boolean and states[automation_blocker].state == 'off' }}"

  - condition: template
    value_template: >
      {% if elevation == 'Always' %}
        true
      {% else %}
        {% set sun_elevation = state_attr('sun.sun', 'elevation') %}
        {% if sun_elevation is none %}
          false
        {% elif sun_elevation > elevation_adjustment and elevation == 'Above horizon' %}
          true
        {% elif sun_elevation <= elevation_adjustment and elevation == 'Below horizon' %}
          true
        {% else %}
          false
        {% endif %}
      {% endif %}

action:
  - choose:
      # Motion detected: turn fan off
      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.state == 'on' }}"
        sequence:
          - service: fan.turn_off
            target: !input fan_target

      # No motion: turn fan on
      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.state == 'off' }}"
          - condition: or
            conditions:
              - condition: template
                value_template: "{{ motion_off_blocker == none }}"
              - condition: template
                value_template: "{{ motion_off_blocker_boolean and states[motion_off_blocker].state == 'on' }}"
              - condition: template
                value_template: "{{ not motion_off_blocker_boolean and states[motion_off_blocker].state == 'off' }}"
        sequence:
          - condition: time
            after: !input time_default_start
            before: !input time_default_end

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ luminance_sensor == none }}"
                sequence:
                  - service: fan.turn_on
                    target: !input fan_target

              - conditions:
                  - condition: numeric_state
                    entity_id: !input luminance_sensor
                    below: !input luminance_required
                sequence:
                  - service: fan.turn_on
                    target: !input fan_target

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ scene_ambient != '' }}"
                  - condition: time
                    after: !input time_scene_ambient_start
                    before: !input time_scene_ambient_end
                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: !input scene_ambient
